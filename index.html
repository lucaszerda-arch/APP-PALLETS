<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERDA LOGÍSTICA - Gestión de Vales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .signature-wrapper { touch-action: none; cursor: crosshair; user-select: none; -webkit-user-select: none; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #canvas { display: block; width: 100%; height: 160px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-10 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">ZERDA <span class="text-blue-600">LOGÍSTICA</span></h1>
            <p class="text-slate-500 text-sm font-medium">Sistema de Gestión en Tiempo Real</p>
        </div>
        <div id="reloj" class="hidden md:block text-lg font-mono bg-white border px-4 py-2 rounded-xl shadow-sm text-slate-600">00:00:00</div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <div class="lg:col-span-7 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <form id="valeForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Transporte</label>
                        <select id="colecta" required class="w-full border p-3 rounded-xl bg-slate-50 outline-none">
                            <option value="">Seleccionar...</option>
                            <option value="MOOVA">MOOVA</option>
                            <option value="WEBPACK">WEBPACK</option>
                            <option value="RETIRA MELI">RETIRA MELI</option>
                            <option value="IFLOW">IFLOW</option>
                            <option value="OCA">OCA</option>
                            <option value="ORO NEGRO">ORO NEGRO</option>
                            <option value="FLOTA PROPIA">FLOTA PROPIA</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Responsable Despacho</label>
                        <select id="despachador" required class="w-full border p-3 rounded-xl bg-slate-50 outline-none">
                            <option value="">Seleccionar...</option>
                            <option value="LUCAS ZERDA">LUCAS ZERDA</option>
                            <option value="BRIAN LEICHNER">BRIAN LEICHNER</option>
                            <option value="JORGE PALOMARES">JORGE PALOMARES</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Chofer</label>
                        <input type="text" id="chofer" required class="w-full border p-3 rounded-xl uppercase">
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Patente</label>
                        <input type="text" id="patente" required class="w-full border p-3 rounded-xl uppercase" placeholder="ABC-123">
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">DNI</label>
                        <input type="number" id="dni" required class="w-full border p-3 rounded-xl">
                    </div>

                    <!-- FIX: El select de puertas ahora se genera correctamente via JS, no con document.write dentro del HTML -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Puerta</label>
                        <select id="puerta" required class="w-full border p-3 rounded-xl bg-slate-50"></select>
                    </div>
                </div>

                <!-- FIX: Los botones +/- ahora usan data attributes en vez de onclick inline para mayor compatibilidad -->
                <div class="bg-slate-50 p-6 rounded-2xl flex items-center justify-between border border-slate-100">
                    <span class="text-xs font-bold text-slate-500 uppercase">Cantidad de Pallets</span>
                    <div class="flex items-center gap-4">
                        <button type="button" id="btn-menos" class="w-10 h-10 bg-white border rounded-full font-bold text-xl shadow-sm select-none">−</button>
                        <input type="number" id="pallets" value="0" min="0" readonly class="w-16 text-center text-2xl font-black bg-transparent outline-none">
                        <button type="button" id="btn-mas" class="w-10 h-10 bg-white border rounded-full font-bold text-xl shadow-sm select-none">+</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-slate-500 uppercase">Firma Transportista</label>
                        <button type="button" id="btn-limpiar" class="text-xs text-blue-600 font-bold">LIMPIAR</button>
                    </div>
                    <!-- FIX: El canvas ahora tiene dimensiones físicas fijas; el resize las actualiza correctamente -->
                    <div class="signature-wrapper border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 overflow-hidden" id="canvas-wrapper">
                        <canvas id="canvas"></canvas>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">
                    GENERAR VISTA PREVIA
                </button>
            </form>
        </div>

        <div class="lg:col-span-5 flex flex-col items-center">
            <div id="vale-render" class="bg-white w-full border border-slate-200 shadow-xl rounded-sm p-8 text-slate-800">
                <div class="text-center border-b pb-6 mb-6">
                    <h2 class="text-xl font-black uppercase tracking-widest">Vale de Entrega</h2>
                    <p class="text-[10px] text-slate-400 font-mono mt-1">OPERACIONES ZERDA LOGÍSTICA</p>
                </div>

                <div class="grid grid-cols-2 gap-4 text-sm mb-6">
                    <div><span class="text-[10px] text-slate-400 uppercase font-bold block">Transporte</span><p id="v-colecta" class="font-bold">---</p></div>
                    <div class="text-right"><span class="text-[10px] text-slate-400 uppercase font-bold block">Puerta</span><p id="v-puerta" class="font-bold">---</p></div>
                    <div><span class="text-[10px] text-slate-400 uppercase font-bold block">Chofer</span><p id="v-chofer" class="font-bold">---</p></div>
                    <div class="text-right"><span class="text-[10px] text-slate-400 uppercase font-bold block">Pallets</span><p id="v-pallets" class="font-black text-2xl">0</p></div>
                </div>

                <div class="border-t pt-4">
                    <span class="text-[10px] text-slate-400 uppercase font-bold block text-center mb-2">Firma Digital</span>
                    <div class="h-24 flex items-center justify-center bg-slate-50 rounded-lg">
                        <img id="v-firma" src="" class="max-h-full hidden">
                    </div>
                </div>
                
                <div class="mt-6 flex justify-between items-end text-[9px] text-slate-400 font-mono">
                    <div>
                        <p id="v-fecha">--/--/--</p>
                        <p id="v-folio">FOLIO: PENDIENTE</p>
                    </div>
                    <p>Copia Digital Certificada</p>
                </div>
            </div>

            <div id="controles" class="hidden mt-6 w-full space-y-3">
                <button id="btn-save" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-emerald-700">
                    <span id="btn-icon">☁️</span> <span id="btn-text">Subir a la Nube</span>
                </button>
            </div>
        </div>
    </main>

    <script>
        // =============================================
        // CONFIGURACIÓN SUPABASE
        // =============================================
        const SUPABASE_URL = "TU_SUPABASE_URL";
        const SUPABASE_KEY = "TU_SUPABASE_ANON_KEY";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // =============================================
        // FIX: Generar opciones de Puerta via JS (no con document.write dentro de <select>)
        // =============================================
        const selectPuerta = document.getElementById('puerta');
        for (let i = 1; i <= 20; i++) {
            const opt = document.createElement('option');
            opt.value = `Puerta ${i}`;
            opt.textContent = `Puerta ${i}`;
            selectPuerta.appendChild(opt);
        }

        // =============================================
        // FIX: Botones +/- con event listeners (no onclick inline)
        // =============================================
        document.getElementById('btn-mas').addEventListener('click', function() {
            const input = document.getElementById('pallets');
            input.value = (parseInt(input.value) || 0) + 1;
        });

        document.getElementById('btn-menos').addEventListener('click', function() {
            const input = document.getElementById('pallets');
            const actual = parseInt(input.value) || 0;
            if (actual > 0) input.value = actual - 1;
        });

        // =============================================
        // FIX: Canvas - inicialización correcta con ResizeObserver
        // =============================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let canvasReady = false;

        function setupCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const w = wrapper.clientWidth;
            const h = 160;

            // Guardamos el contenido actual si ya había firma
            let imageData = null;
            if (canvasReady && canvas.width > 0) {
                try { imageData = ctx.getImageData(0, 0, canvas.width, canvas.height); } catch(e) {}
            }

            canvas.width = w;
            canvas.height = h;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';

            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#1e293b';

            // Restaurar firma si existía
            if (imageData) {
                try { ctx.putImageData(imageData, 0, 0); } catch(e) {}
            }

            canvasReady = true;
        }

        // Usar ResizeObserver para detectar cuando el wrapper tiene dimensiones reales
        const ro = new ResizeObserver(() => { setupCanvas(); });
        ro.observe(document.getElementById('canvas-wrapper'));

        // También inicializar al cargar
        if (document.readyState === 'complete') {
            setupCanvas();
        } else {
            window.addEventListener('load', setupCanvas);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        const startDraw = (e) => {
            drawing = true;
            ctx.beginPath();
            const p = getPos(e);
            ctx.moveTo(p.x, p.y);
        };

        const moveDraw = (e) => {
            if (!drawing) return;
            e.preventDefault();
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        };

        const stopDraw = () => { drawing = false; };

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        window.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', moveDraw, { passive: false });
        window.addEventListener('touchend', stopDraw);

        // FIX: Botón limpiar con event listener
        document.getElementById('btn-limpiar').addEventListener('click', function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // =============================================
        // GUARDADO EN SUPABASE
        // =============================================
        async function enviarASupabase() {
            const btn = document.getElementById('btn-save');
            const txt = document.getElementById('btn-text');
            const icon = document.getElementById('btn-icon');

            btn.disabled = true;
            txt.innerText = "Guardando...";
            icon.innerHTML = '<div class="loader"></div>';

            const folio = "ZL-" + Math.random().toString(36).substr(2, 6).toUpperCase();

            try {
                const element = document.getElementById('vale-render');
                const canvasPdf = await html2canvas(element, { scale: 2 });
                const imgData = canvasPdf.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(imgData, 'PNG', 0, 10, 210, (canvasPdf.height * 210) / canvasPdf.width);
                const pdfBlob = pdf.output('blob');

                await supabase.storage.from('gestion_vales').upload(`pdfs/${folio}.pdf`, pdfBlob);
                const firmaBlob = await (await fetch(canvas.toDataURL())).blob();
                await supabase.storage.from('gestion_vales').upload(`firmas/${folio}.png`, firmaBlob);

                const pdfUrl = supabase.storage.from('gestion_vales').getPublicUrl(`pdfs/${folio}.pdf`).data.publicUrl;
                const firmaUrl = supabase.storage.from('gestion_vales').getPublicUrl(`firmas/${folio}.png`).data.publicUrl;

                await supabase.from('vales').insert([{
                    folio_id: folio,
                    transporte: document.getElementById('colecta').value,
                    despachador: document.getElementById('despachador').value,
                    chofer: document.getElementById('chofer').value.toUpperCase(),
                    dni: document.getElementById('dni').value,
                    patente: document.getElementById('patente').value.toUpperCase(),
                    puerta: document.getElementById('puerta').value,
                    pallets: parseInt(document.getElementById('pallets').value),
                    firma_url: firmaUrl,
                    pdf_url: pdfUrl
                }]);

                txt.innerText = "¡Éxito!";
                icon.innerHTML = "✅";
                pdf.save(`Vale_${folio}.pdf`);

            } catch (e) {
                console.error(e);
                alert("Error: " + e.message);
                btn.disabled = false;
                txt.innerText = "Reintentar";
                icon.innerHTML = "☁️";
            }
        }

        document.getElementById('btn-save').addEventListener('click', enviarASupabase);

        // =============================================
        // FORMULARIO - GENERAR VISTA PREVIA
        // =============================================
        document.getElementById('valeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('v-colecta').innerText = document.getElementById('colecta').value;
            document.getElementById('v-chofer').innerText = document.getElementById('chofer').value.toUpperCase();
            document.getElementById('v-puerta').innerText = document.getElementById('puerta').value;
            document.getElementById('v-pallets').innerText = document.getElementById('pallets').value;
            document.getElementById('v-fecha').innerText = new Date().toLocaleString('es-AR');
            document.getElementById('v-folio').innerText = "FOLIO: PROCESANDO...";

            const vFirma = document.getElementById('v-firma');
            vFirma.src = canvas.toDataURL();
            vFirma.classList.remove('hidden');
            document.getElementById('controles').classList.remove('hidden');
            document.getElementById('vale-render').scrollIntoView({ behavior: 'smooth' });
        });

        // =============================================
        // RELOJ
        // =============================================
        setInterval(() => {
            const r = document.getElementById('reloj');
            if (r) r.innerText = new Date().toLocaleTimeString('es-AR');
        }, 1000);
    </script>
</body>
</html>
