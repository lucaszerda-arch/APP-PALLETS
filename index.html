<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERDA LOGÍSTICA - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .signature-wrapper { touch-action: none; background: #f1f5f9; position: relative; }
        canvas { touch-action: none; cursor: crosshair; display: block; width: 100%; height: 160px; }
        button { cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-10">
        <h1 class="text-3xl font-black text-slate-800">ZERDA <span class="text-blue-600">LOGÍSTICA</span></h1>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
        <div class="lg:col-span-7 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <form id="valeForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="chofer" placeholder="CHOFER" required class="border p-3 rounded-xl uppercase">
                    <input type="text" id="patente" placeholder="PATENTE" required class="border p-3 rounded-xl uppercase">
                    <select id="colecta" required class="border p-3 rounded-xl bg-slate-50">
                        <option value="">TRANSPORTE...</option>
                        <option value="MOOVA">MOOVA</option>
                        <option value="WEBPACK">WEBPACK</option>
                        <option value="IFLOW">IFLOW</option>
                        <option value="FLOTA PROPIA">FLOTA PROPIA</option>
                    </select>
                    <select id="puerta" required class="border p-3 rounded-xl bg-slate-50">
                        <script>for(let i=1; i<=10; i++) document.write(`<option value="Puerta ${i}">Puerta ${i}</option>`);</script>
                    </select>
                </div>

                <div class="bg-slate-50 p-6 rounded-2xl flex items-center justify-between border">
                    <span class="font-bold text-slate-500">PALLETS</span>
                    <div class="flex items-center gap-6">
                        <button type="button" id="btn-menos" class="w-12 h-12 bg-white border-2 border-blue-600 text-blue-600 rounded-full font-black text-xl shadow-sm active:bg-blue-100">-</button>
                        <input type="number" id="pallets" value="0" readonly class="w-12 text-center text-2xl font-black bg-transparent">
                        <button type="button" id="btn-mas" class="w-12 h-12 bg-blue-600 text-white rounded-full font-black text-xl shadow-sm active:bg-blue-800">+</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label class="text-xs font-bold text-slate-400 uppercase">Firma Transportista</label>
                        <button type="button" id="btn-clear" class="text-blue-600 text-xs font-bold">BORRAR</button>
                    </div>
                    <div class="signature-wrapper border-2 border-dashed rounded-2xl overflow-hidden">
                        <canvas id="canvas"></canvas>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">GENERAR VISTA PREVIA</button>
            </form>
        </div>

        <div class="lg:col-span-5 flex flex-col items-center">
            <div id="vale-render" class="bg-white w-full border border-slate-200 p-8 shadow-lg rounded-lg text-slate-800">
                <h2 class="text-center font-black border-b pb-4 mb-4">VALE DE ENTREGA</h2>
                <div class="space-y-2 text-sm">
                    <p><strong>Transporte:</strong> <span id="v-colecta">---</span></p>
                    <p><strong>Chofer:</strong> <span id="v-chofer">---</span></p>
                    <p><strong>Pallets:</strong> <span id="v-pallets" class="text-xl font-bold">0</span></p>
                </div>
                <div class="mt-4 border-t pt-4 text-center">
                    <p class="text-[10px] text-slate-400 mb-2">FIRMA</p>
                    <img id="v-firma" class="mx-auto max-h-20 hidden border">
                </div>
            </div>
            
            <div id="controles" class="hidden mt-6 w-full">
                <button id="btn-save" onclick="enviarASupabase()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl">SUBIR A SUPABASE</button>
            </div>
        </div>
    </main>

    <script>
        // --- 1. CONFIGURACIÓN ---
        const SUPABASE_URL = "TU_SUPABASE_URL";
        const SUPABASE_KEY = "TU_SUPABASE_ANON_KEY";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. LÓGICA DE PALLETS (FORZADA) ---
        const inputPallets = document.getElementById('pallets');
        
        document.getElementById('btn-mas').addEventListener('click', () => {
            inputPallets.value = parseInt(inputPallets.value) + 1;
        });

        document.getElementById('btn-menos').addEventListener('click', () => {
            let val = parseInt(inputPallets.value);
            if (val > 0) inputPallets.value = val - 1;
        });

        // --- 3. LÓGICA DE FIRMA (FORZADA PARA MÓVIL) ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { desynchronized: true });
        let escribiendo = false;

        function ajustarCanvas() {
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = 160;
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000000';
        }

        window.addEventListener('load', ajustarCanvas);
        window.addEventListener('resize', ajustarCanvas);

        function obtenerCoordenadas(e) {
            const rect = canvas.getBoundingClientRect();
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const clienteY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clienteX - rect.left,
                y: clienteY - rect.top
            };
        }

        const empezarFirma = (e) => {
            escribiendo = true;
            const pos = obtenerCoordenadas(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            if(e.cancelable) e.preventDefault();
        };

        const moverFirma = (e) => {
            if (!escribiendo) return;
            const pos = obtenerCoordenadas(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if(e.cancelable) e.preventDefault();
        };

        const detenerFirma = () => { escribiendo = false; };

        // Registro de eventos explícito
        canvas.addEventListener('mousedown', empezarFirma);
        canvas.addEventListener('mousemove', moverFirma);
        window.addEventListener('mouseup', detenerFirma);

        canvas.addEventListener('touchstart', empezarFirma, { passive: false });
        canvas.addEventListener('touchmove', moverFirma, { passive: false });
        canvas.addEventListener('touchend', detenerFirma);

        document.getElementById('btn-clear').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // --- 4. VISTA PREVIA ---
        document.getElementById('valeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('v-colecta').innerText = document.getElementById('colecta').value;
            document.getElementById('v-chofer').innerText = document.getElementById('chofer').value;
            document.getElementById('v-pallets').innerText = inputPallets.value;
            
            const imgPreview = document.getElementById('v-firma');
            imgPreview.src = canvas.toDataURL();
            imgPreview.classList.remove('hidden');
            document.getElementById('controles').classList.remove('hidden');
        });

        // --- 5. ENVÍO A SUPABASE ---
        async function enviarASupabase() {
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            try {
                const folio = "ZL-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                
                // Generar PDF
                const render = document.getElementById('vale-render');
                const canvasPdf = await html2canvas(render);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                pdf.addImage(canvasPdf.toDataURL('image/png'), 'PNG', 10, 10, 190, 0);
                const pdfBlob = pdf.output('blob');

                // Subir a Storage
                await supabase.storage.from('gestion_vales').upload(`vales/${folio}.pdf`, pdfBlob);
                
                // Insertar en tabla
                const { error } = await supabase.from('vales').insert([{
                    folio_id: folio,
                    transporte: document.getElementById('colecta').value,
                    chofer: document.getElementById('chofer').value,
                    pallets: parseInt(inputPallets.value),
                    pdf_url: folio
                }]);

                if(error) throw error;
                alert("¡GUARDADO CON ÉXITO!");
                location.reload();

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "REINTENTAR";
            }
        }
    </script>
</body>
</html>
